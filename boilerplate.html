	function getCookie(name) {
		const cookies = document.cookie.split("; ").reduce((acc, cookie) => {
			const [key, value] = cookie.split("=");
			acc[key] = value;
			return acc;
		}, {});

		return cookies[name] ? decodeURIComponent(cookies[name]) : null;
	}

	function setCookie(key,value){
		if (key==null) {return;}

		const now = new Date();
		const d = new Date();
		d.setTime(d.getTime() + (45 * 24 * 60 * 60 * 1000));
		let expiry = "expires=" + d.toUTCString();

		document.cookie = key+"="+value+";"+expiry+";path=/";
	}

	function extractCoordinates(input) {
		const regex = /LatLng\((-?\d+\.\d+), (-?\d+\.\d+)\)/g;
		let coordinates = [];
		let match;
		
		while ((match = regex.exec(input)) !== null) {
			coordinates.push([parseFloat(match[1]), parseFloat(match[2])]);
		}
		
		return coordinates.map(coord => `[${coord.join(",")}]`).join(",");
	}

	function parseCoordinatesString(coordinatesString) {
		// Removing leading and trailing brackets, if any
		coordinatesString = coordinatesString.replace(/^\[|\]$/g, '');

		// Splitting the string into pairs of coordinates
		const pairs = coordinatesString.split('],[');

		// Initialize an array to hold the coordinates
		const coordinates = [];

		// Extracting coordinates from pairs and pushing them to the coordinates array
		pairs.forEach(pair => {
			const [lat, lng] = pair.split(',').map(Number);
			coordinates.push([lat, lng]);
		});

		return coordinates;
	}

	function isValidHexColor(color) {
		// Regular expression to match a valid hex color code
		const hexRegex = /^#[0-9A-Fa-f]{6}$/;
		return hexRegex.test(color);
	}

	function debounce(func, delay) {
		let timer;
		return function(...args) {
			clearTimeout(timer);
			timer = setTimeout(() => func.apply(this, args), delay);
		};
	}

	function disableDrawControls() {
		Object.values(drawControls).forEach(control => {
			map.removeControl(control);
		});
	}

	function enableDrawControls() {
		Object.values(drawControls).forEach(control => {
			map.addControl(control);
		});
	}

	function togglePanel(show) {
		const app = document.getElementById('app');
  		app.classList.toggle('panel-open', show);

		if (show) {disableDrawControls();} else 
		if (!show) {enableDrawControls();}

		setTimeout(() => {
			map.invalidateSize();
		}, 310);
	}

	function clearErrors(form) {
		form.querySelectorAll('.field-error').forEach(el => {
			el.classList.remove('field-error');
		});
		form.querySelectorAll('.error-stamp').forEach(el => el.remove());
	}

	function stampError(input, message) {
		input.classList.add('field-error');

		// Avoid duplicate stamps
		if (input.nextElementSibling?.classList.contains('error-stamp')) return;

		const stamp = document.createElement('div');
		stamp.className = 'error-stamp' + (Math.random() > 0.5 ? ' alt' : '');
		stamp.textContent = message;

		input.after(stamp);
	}

	function updateImagePreview(input, wrapper) {
		const preview = wrapper.querySelector('#imagePreview');
		const inner = preview.querySelector('.image-preview-inner');

		// Clear everything at the start (no preserved stamps)
		inner.innerHTML = '';
		preview.classList.remove('visible', 'failed');

		// Reset status
		imageStatus = 'idle';

		// Empty input → handled outside with 'Required'
		if (!input.value.trim()) return;

		const startTime = Date.now();
		const MIN_DURATION = 2800 + Math.random() * 600;

		// Loader phrases
		const phrases = [
			'Verifying Image',
			'Inspecting Photograph',
			'Checking Records',
			'Reviewing Evidence',
			'Confirming Attachment',
			'Bogos Binted?'
		];

		const loader = document.createElement('div');
		loader.className = 'image-loader redemption';
		loader.textContent = phrases[Math.floor(Math.random() * phrases.length)];
		inner.appendChild(loader);
		preview.classList.add('visible');

		const img = new Image();
		img.src = input.value;

		const finish = (callback) => {
			const elapsed = Date.now() - startTime;
			const remaining = Math.max(0, MIN_DURATION - elapsed);
			setTimeout(callback, remaining);
		};

		img.onload = () => {
			finish(() => {
				inner.innerHTML = '';
				imageStatus = 'approved';

				const stamp = document.createElement('div');
				stamp.className = 'approved-stamp redemption';
				stamp.textContent = 'Approved';
				inner.appendChild(stamp);

				setTimeout(() => {
					stamp.classList.add('fade-out');
					setTimeout(() => {
						inner.removeChild(stamp);
						inner.appendChild(img);
						requestAnimationFrame(() => img.classList.add('visible'));
					}, 500);
				}, 900);
			});
		};

		img.onerror = () => {
			finish(() => {
				inner.innerHTML = '';
				imageStatus = 'rejected';
				preview.classList.add('failed');

				const stamp = document.createElement('div');
				stamp.className = 'error-stamp redemption';
				stamp.textContent = 'Image Not Found';
				inner.appendChild(stamp);
			});
		};
	}

					.trim()
					.toLowerCase()
					.replace(/\s+/g, ' ')

			}

				// Title validation

					stampError(form.title, 'Required');
					valid = false;
				}

				// Image validation (only if visible)
				if (form.image && form.image.style.display !== 'none') {

					if (!form.image.value.trim()) {
						// Empty → stamp outside like other fields
						//stampError(form.image, 'Required');
						//valid = false;
						imageUsed = false;

						const inner = wrapper.querySelector('#imagePreview .image-preview-inner');

						if (stamp) {

						} else {
							// Create stamp if none exists (first-time submit)
							stamp = document.createElement('div');
							stamp.className = 'error-stamp redemption';
							stamp.textContent = 'Must Be Valid Image';
							inner.appendChild(stamp);
						}
					}
				}

				let categoryValue = categorySelect.value;

				if (!categoryValue) {
					stampError(categorySelect, 'Required');
					valid = false;

				} else if (categoryValue === '__new__') {
					if (!newCategoryInput.value.trim()) {
						stampError(newCategoryInput, 'Required');
						valid = false;
					} else {
						categoryValue = sanitiseCategory(newCategoryInput.value);
					}
				} else {
					categoryValue = sanitiseCategory(categoryValue);
				}

				if (!iconInput.value) {
					stampError(iconPicker, 'Required');
					valid = false;
				}

				if (!valid) return;
				const data = new FormData(form);
				console.log([...data.entries()]);

				// REST POST here
				const formData = new URLSearchParams();
				formData.append("type", "pins");
				formData.append("category", categoryValue);
				formData.append("xcoord", document.getElementById("xcoord").value);
				formData.append("ycoord", document.getElementById("ycoord").value);
				formData.append("name", document.getElementById("title").value);
				formData.append("color", document.getElementById("color").value);
				formData.append("icon", iconInput.value);
				if (imageUsed) {formData.append("image", document.getElementById("image").value);}
				else if (!imageUsed) {formData.append("image", "https://picsum.photos/256/256.jpg");}

				fetch(endpoint, {
					method: "POST",
					body: formData
				})
				.then(res => res.text())
				.then(console.log)
				.catch(console.error);

				// Clean up form and UI
				wrapper.remove();
				togglePanel(false);
				map.removeLayer(layer);
				setTimeout(function() {
					location.reload();
				}, 2500);

			// Handle reset/cancel
			form.addEventListener('reset', (e) => {
				e.preventDefault();
				wrapper.remove();
				togglePanel(false);
				map.removeLayer(layer);
			});

			} else if (layer instanceof L.Polyline) {
				polyParser(layer)
			}
		}, 500);
	});

	/*map.on('editable:vertex:ctrlclick', ({ layer }) => { // for poly drawing edit re-commits

	function polyParser(layer) {
		let extract = layer.getLatLngs();
		let coords = extractCoordinates(extract);
		let type; if (layer instanceof L.Polygon) {type = "polygon"}
		else if (layer instanceof L.Polyline) {type = "polyline"};

		togglePanel(true);

		const panel = document.getElementById('side-panel');
		const wrapper = document.createElement("div");
		wrapper.classList.add("redemption","form-container");

		wrapper.innerHTML = `
		<h1>Ranch Map Poly Creator</h1>
		<p>Now that you have placed the vertices of the Polyline or Polygon, submit the details to this form. You may also continuing editing the vertices if you are not 100% satisfied.</p>

		<form id="polyForm" novalidate>
			<input type="hidden" id="polytype" name="polytype">
			<input type="hidden" id="coords" name="coords">

			<label for="categorySelect">Category</label>
			<select id="categorySelect" name="categorySelect">
				<option value="">-- Select Category --</option>
				${[...mapCategories].sort((a, b) => a.localeCompare(b))
				.map(cat => `<option value="${cat}">${cat}</option>`).join('')}
				<option value="__new__">+ New Category</option>
			</select>
			<input type="text" id="newCategory" name="newCategory" placeholder="New category..." style="display:none;">
				
			<label for="title">Label of Poly</label>
			<input type="text" id="title" name="title" required>
			
			<label for="image" id="imagelabel">Descriptor Image</label>
			<input type="url" id="image" name="image">
			<div class="image-preview" id="imagePreview">
				<div class="image-preview-inner"></div>
			</div>
			
			<label for="color">Select Color</label>
			<input type="color" id="color" name="color" value="#454545">

			<input class="form-button redemption" type="reset" value="Cancel">
			<input class="form-button redemption" type="submit" value="Submit">
		</form>`;
		panel.appendChild(wrapper);

		const form = wrapper.querySelector('#polyForm');
		const categorySelect = form.querySelector('#categorySelect');
		const newCategoryInput = form.querySelector('#newCategory');

		categorySelect.addEventListener('change', () => {
			if (categorySelect.value === '__new__') {
				newCategoryInput.style.display = 'block';
			} else {
				newCategoryInput.style.display = 'none';
				newCategoryInput.value = '';
			}
		});

		// Set hidden fields
		form.polytype.value = type;
		form.coords.value = coords;

		// Hide image input for polylines
		if (type === "polyline") {
			form.image.value = "https://picsum.photos/256/256.jpg";
			wrapper.querySelector('#imagePreview').remove();
			form.image.style.display = 'none';
			wrapper.querySelector('#imagelabel').style.display = 'none';
		}

		// Debounced image validation (wait 500ms after typing stops)
		const debouncedUpdateImage = debounce(() => {
			updateImagePreview(form.image, wrapper);
		}, 500);

		form.addEventListener('input', (e) => {
			const target = e.target;

			// Remove previous field-error if typing
			if (target.classList.contains('field-error')) {
				target.classList.remove('field-error');
				if (target.nextElementSibling?.classList.contains('error-stamp')) {
					target.nextElementSibling.remove();
				}
			}

			// Only run image validation if the input changed
			if (target === form.image) {
				debouncedUpdateImage();
			}
		});

		function sanitiseCategory(str) {
			return str
				.trim()
				.toLowerCase()
				.replace(/\s+/g, ' ')
				.replace(/^./, c => c.toUpperCase());
		}

		// Handle form submission
		form.addEventListener('submit', (e) => {
			e.preventDefault();
			clearErrors(form);

			let valid = true;
			let imageUsed = true;

			// Title validation
			if (!form.title.value.trim()) {
				stampError(form.title, 'Required');
				valid = false;
			}

			// Image validation (only if visible)
			if (form.image && form.image.style.display !== 'none') {

				if (!form.image.value.trim()) {
					// Empty → stamp outside like other fields
					//stampError(form.image, 'Required');
					//valid = false;
					imageUsed = false;
				} else if (imageStatus !== 'approved') {
					valid = false;

					const inner = wrapper.querySelector('#imagePreview .image-preview-inner');
					let stamp = inner.querySelector('.error-stamp');

					if (stamp) {
						// Reuse existing stamp and update text
						stamp.textContent = 'Must Be Valid Image';
					} else {
						// Create stamp if none exists (first-time submit)
						stamp = document.createElement('div');
						stamp.className = 'error-stamp redemption';
						stamp.textContent = 'Must Be Valid Image';
						inner.appendChild(stamp);
					}
				}
			}

			let categoryValue = categorySelect.value;

			if (!categoryValue) {
				stampError(categorySelect, 'Required');
				valid = false;

			} else if (categoryValue === '__new__') {
				if (!newCategoryInput.value.trim()) {
					stampError(newCategoryInput, 'Required');
					valid = false;
				} else {
					categoryValue = sanitiseCategory(newCategoryInput.value);
				}
			} else {
				categoryValue = sanitiseCategory(categoryValue);
			}

			if (!valid) return;
			const data = new FormData(form);
			console.log([...data.entries()]);

			// REST POST here
            const formData = new URLSearchParams();
            formData.append("type", "poly");
            formData.append("polytype", document.getElementById("polytype").value);
			formData.append("category", categoryValue);
            formData.append("coords", coords);
            formData.append("name", document.getElementById("title").value);
			if (imageUsed) {formData.append("image", document.getElementById("image").value);}
			else if (!imageUsed) {formData.append("image", "https://picsum.photos/256/256.jpg");}
            formData.append("color", document.getElementById("color").value);

            fetch(endpoint, {
                method: "POST",
                body: formData
			})
			.then(res => res.text())
			.then(console.log)
			.catch(console.error);

			// Clean up form and UI
			wrapper.remove();
			togglePanel(false);
			map.removeLayer(layer);
			setTimeout(function() {
				location.reload();
			}, 2500);
		});

		// Handle reset/cancel
		form.addEventListener('reset', (e) => {
			e.preventDefault();
			wrapper.remove();
			togglePanel(false);
			map.removeLayer(layer);
		});
	};
